<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recipe</title>
  <link rel="stylesheet" href="/shared/theme.css">
  <link rel="stylesheet" href="/recipe/recipe.css">
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>Fetching recipe…</p>
  </div>

  <div id="error" hidden>
    <h1>Couldn't extract this page</h1>
    <p id="error-detail"></p>
    <div class="error-actions">
      <button id="error-original" class="primary">Open original page</button>
      <button id="error-home">Home</button>
    </div>
  </div>

  <article id="recipe" hidden>
    <img id="hero" alt="" hidden>
    <h1 id="title"></h1>
    <p id="meta"></p>
    <p id="byline" hidden></p>
    <p id="tags" hidden></p>
    <div id="glance" hidden>
      <div id="nut-block" class="glance-item" hidden>
        <div class="glance-head">Nutrition <span class="glance-sub">per serving</span></div>
        <div id="nutrition"></div>
      </div>
      <div id="wine-block" class="glance-item" hidden>
        <div class="glance-head">🍷 Pairing</div>
        <div id="wine"></div>
      </div>
    </div>
    <button id="cook-mode-btn" class="primary" hidden>👨‍🍳 Cook mode</button>

    <section id="ingredients-section" hidden>
      <div class="ing-head">
        <h2>Ingredients</h2>
        <div class="scale-ctl" id="scale-main"></div>
      </div>
      <ul id="ingredients"></ul>
    </section>

    <section>
      <h2 id="steps-heading">Steps</h2>
      <ol id="steps"></ol>
    </section>

    <footer>
      <button id="save-btn">☆ Save</button>
      <button id="open-original">Original page ↗</button>
      <button id="refresh">↻ Re-fetch</button>
    </footer>
  </article>

  <!-- Cook mode: one step at a time, huge text, giant nav -->
  <div id="cookmode" hidden>
    <div id="cm-top">
      <span id="cm-counter"></span>
      <button id="cm-exit">✕</button>
    </div>
    <div id="cm-step"></div>
    <button id="cm-ing-toggle">Ingredients ▲</button>
    <div id="cm-ingredients" hidden>
      <button id="cm-ing-close">Ingredients ▼</button>
      <div class="scale-ctl" id="scale-cm"></div>
      <ul id="cm-ing-list"></ul>
    </div>
    <div id="cm-nav">
      <button id="cm-prev">‹ Back</button>
      <button id="cm-next" class="primary">Next ›</button>
    </div>
  </div>

  <script src="/recipe/drag-scroll.js"></script>
  <script type="module" src="/recipe/recipe.js"></script>
</body>
</html>
